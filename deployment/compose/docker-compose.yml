name: authentication-segment

services:
  # Step 1: Database with health check
  database:
    image: postgres:16-alpine
    container_name: authentication-segment-database
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - auth-network
    restart: unless-stopped

  # Step 2: Migration (runs after database is healthy)
  migration:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.migrate
    container_name: authentication-segment-migration
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - auth-network
    restart: on-failure

  # Step 3: API (runs after database and migration)
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: authentication-segment-api
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      HTTP_PORT: ${HTTP_PORT}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES}
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    depends_on:
      database:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${HTTP_PORT}/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - auth-network
    restart: unless-stopped

  # Step 4: Client (runs after api)
  client:
    build:
      context: ../../apps/client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: authentication-segment-client
    env_file:
      - ../../.env
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - auth-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  auth-network:
    driver: bridge
